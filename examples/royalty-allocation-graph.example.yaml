royalty_allocation_graph:
  id: allocation-2026-0001
  revenue_event_id: revenue-2026-0001
  product_id: derivative-2026-0001
  product_title: Origin Asset Generator GPT
  timestamp: "2026-06-22T00:00:00Z"
  version: v0.4.0-candidate

  currency: JPY
  gross_revenue: 10000
  net_revenue: 10000

  revenue_source:
    channel: gpt_store
    platform: GPT Store
    transaction_reference: gpt-store-revenue-2026-0001

  allocation_basis:
    basis_type: audit_based
    audit_record_ids:
      - audit-2026-0001
    origin_asset_ids:
      - origin-2026-0001
    derivative_asset_ids:
      - derivative-2026-0001
    contribution_scores:
      origin-2026-0001: 0.45
      derivative-2026-0001: 0.55
    policy:
      name: Kazene-Origin-Royalty-Policy-0.4
      allocation_mode: audit_weighted
      description: >
        This allocation policy converts audit-supported lineage, contribution
        scores, derivative participation, and protocol maintenance requirements
        into a proposed royalty allocation graph.

  allocations:
    - recipient_id: final-creator-samuraiwriter7
      recipient_role: final_creator
      related_asset_id: derivative-2026-0001
      rate: 0.85
      amount: 8500
      currency: JPY
      calculation_note: >
        The final creator receives the primary share because this revenue event
        is generated by the final derivative asset.
      settlement_status: proposed

    - recipient_id: origin-creator-samuraiwriter7
      recipient_role: origin_creator
      related_asset_id: origin-2026-0001
      rate: 0.05
      amount: 500
      currency: JPY
      calculation_note: >
        The upstream origin creator receives a royalty share based on the
        audited origin contribution and declared lineage from the Origin Asset.
      settlement_status: proposed

    - recipient_id: derivative-creator-samuraiwriter7
      recipient_role: derivative_creator
      related_asset_id: derivative-2026-0001
      rate: 0.07
      amount: 700
      currency: JPY
      calculation_note: >
        The derivative creator receives a share for transforming the upstream
        Origin Asset into a practical GPT-oriented workflow.
      settlement_status: proposed

    - recipient_id: auditor-protocol-maintainer
      recipient_role: auditor
      related_asset_id: audit-2026-0001
      rate: 0.02
      amount: 200
      currency: JPY
      calculation_note: >
        The auditor receives a share for producing the Origin Audit Record used
        as evidence in this allocation graph.
      settlement_status: proposed

    - recipient_id: origin-structure-market-protocol-fund
      recipient_role: protocol_fund
      rate: 0.01
      amount: 100
      currency: JPY
      calculation_note: >
        The protocol fund receives a maintenance share for supporting registry,
        validation, documentation, and future marketplace infrastructure.
      settlement_status: proposed

  settlement:
    mechanism: hybrid
    status: proposed
    payment_reference: royalty-allocation-proposal-2026-0001
    notes: >
      This allocation graph is a proposed settlement record. It does not execute
      payment by itself. It can be used by off-chain accounting systems,
      marketplace logic, or future smart contract settlement layers.

  human_review:
    required: true
    status: pending
    reviewer: protocol-maintainer
    notes: >
      Human review is required before this allocation graph becomes binding,
      especially because contribution scores and royalty allocation may affect
      real compensation.

  trace:
    source_url: https://github.com/SamuraiWriter7/origin-structure-market
    repository_url: https://github.com/SamuraiWriter7/origin-structure-market
    related_assets:
      - origin-2026-0001
      - derivative-2026-0001
      - audit-2026-0001
      - ai-search-trace-receipt-standard
      - synchronization-audit-protocol
      - compute-access-royalty-os
      - okf-royalty-os-bridge
      - kazene-trace-receipt-protocol
    evidence_hashes:
      - sha256:ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff

  notes: >
    This example demonstrates the v0.4 Royalty Allocation Graph layer. It
    converts a revenue event, audited lineage, contribution scores, and
    allocation policy into a proposed royalty distribution across the final
    creator, origin creator, derivative creator, auditor, and protocol fund.
